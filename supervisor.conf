[supervisord]
nodaemon = true
logfile=/dev/stdout
logfile_maxbytes=0
environment =

[program:nginx]
command=/bin/sh -c "nginx -g 'daemon off;' -c /etc/nginx/nginx.conf"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
priority=0
startretries=5
startsecs=1

[program:webfrontend]
user=%(ENV_DOCKER_USER)s
directory=/baserow/web-frontend
command=/baserow/supervisor/wrapper.sh YELLOW WEBFRONTEND node --import ./env-remap.mjs .output/server/index.mjs
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=10
startretries=5
startsecs=10

[program:backend]
user=%(ENV_DOCKER_USER)s
directory=/baserow/backend
command=/baserow/supervisor/wrapper.sh BLUE BACKEND ./docker/docker-entrypoint.sh %(ENV_BASEROW_BACKEND_STARTUP_COMMAND)s
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=2
startretries=5
startsecs=30

[program:celeryworker]
user=%(ENV_DOCKER_USER)s
directory=/baserow/backend
command=/baserow/supervisor/wrapper.sh CYAN CELERY_WORKER ./docker/docker-entrypoint.sh %(ENV_BASEROW_CELERY_WORKER_STARTUP_COMMAND)s
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=2
startretries=5
startsecs=30

[program:exportworker]
user=%(ENV_DOCKER_USER)s
directory=/baserow/backend
command=/baserow/supervisor/wrapper.sh CYAN EXPORT_WORKER ./docker/docker-entrypoint.sh %(ENV_BASEROW_CELERY_EXPORT_WORKER_STARTUP_COMMAND)s
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=2
startretries=5
startsecs=30

[program:beatworker]
user=%(ENV_DOCKER_USER)s
directory=/baserow/backend
command=/baserow/supervisor/wrapper.sh CYAN BEAT_WORKER ./docker/docker-entrypoint.sh %(ENV_BASEROW_CELERY_BEAT_STARTUP_COMMAND)s
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=100
startretries=5
startsecs=100
stopsignal=QUIT
