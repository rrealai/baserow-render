worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    upstream backend {
        server 127.0.0.1:8000;
    }

    upstream webfrontend {
        server 127.0.0.1:3000;
    }

    server {
        listen 10000;

        # Health check
        location = /_health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # API, websockets, MCP, assistant -> Django backend (port 8000)
        location ~ ^/(api|ws|mcp|assistant)/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        # Media and static files -> backend
        location ~ ^/(media|static)/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Everything else -> Nuxt web frontend (port 3000)
        location / {
            proxy_pass http://webfrontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
